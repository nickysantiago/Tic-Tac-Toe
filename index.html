<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link href='https://fonts.googleapis.com/css?family=Montserrat:400,700' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="selection-screen" class="screen screen-start">
        <header>
            <h1>Tic Tac Toe</h1>
            <p>Choose Your Symbol</p>
            <button id="chooseX">X</button>
            <button id="chooseO">O</button>
        </header>
    </div>

    <div class="board" id="board" style="display: none;">
        <header>
            <h1>Tic Tac Toe</h1>
            <ul>
                <li class="players" id="player1"><span>X</span></li>
                <li class="players" id="player2"><span>O</span></li>
            </ul>
        </header>
        <ul class="boxes">
            <li class="cell"></li>
            <li class="cell"></li>
            <li class="cell"></li>
            <li class="cell"></li>
            <li class="cell"></li>
            <li class="cell"></li>
            <li class="cell"></li>
            <li class="cell"></li>
            <li class="cell"></li>
        </ul>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
